<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Test</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      overflow-x: hidden;
      max-width: 100vw;
    }

    .grid-layout {
      display: grid;
      gap: 20px;
      width: 100%;
    }

    .card {
      padding: 20px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 150px;
    }

    /* Mobile: Single column below 768px */
    @media (max-width: 768px) {
      .grid-layout {
        grid-template-columns: 1fr;
      }
      
      body {
        padding: 0.625rem;
      }
      
      .status::after {
        content: ' - Mobile (< 768px)';
        color: red;
        font-weight: bold;
      }
    }

    /* Tablet: 2 columns from 768px to 1024px */
    @media (min-width: 768px) and (max-width: 1023px) {
      .grid-layout {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .status::after {
        content: ' - Tablet (768px - 1024px)';
        color: orange;
        font-weight: bold;
      }
    }

    /* Desktop: 3+ columns from 1024px */
    @media (min-width: 1024px) {
      .grid-layout {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      
      .status::after {
        content: ' - Desktop (> 1024px)';
        color: green;
        font-weight: bold;
      }
    }

    .info {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .viewport-width {
      font-weight: bold;
      color: #1976d2;
    }
  </style>
</head>
<body>
  <div class="info">
    <h1>Responsive Layout Test</h1>
    <p class="status">Current viewport</p>
    <p>Viewport width: <span class="viewport-width" id="width"></span>px</p>
    <p>Resize your browser window to test responsive breakpoints:</p>
    <ul>
      <li>Mobile: &lt; 768px (1 column)</li>
      <li>Tablet: 768px - 1024px (2 columns)</li>
      <li>Desktop: &gt; 1024px (3+ columns)</li>
    </ul>
  </div>

  <div class="grid-layout">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
  </div>

  <script>
    function updateWidth() {
      document.getElementById('width').textContent = window.innerWidth;
    }
    
    updateWidth();
    window.addEventListener('resize', updateWidth);
  </script>
</body>
</html>
